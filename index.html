<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocab Match Game</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff9f0;
    --accent: #f7b731;
    --text-dark: #2d2d2d;
    --shadow: 0 4px 18px rgba(0,0,0,0.10);
    --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito Sans', sans-serif;
    background: var(--bg);
    background-image: radial-gradient(circle at 15% 20%, #ffe0f7 0%, transparent 40%),
                      radial-gradient(circle at 85% 75%, #d0eaff 0%, transparent 40%);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 28px 16px 40px;
  }

  /* ── SETUP SCREEN ── */
  #setup-screen {
    width: 100%; max-width: 520px;
    background: white; border-radius: 28px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    padding: 36px 40px; margin-top: 20px;
  }
  #setup-screen h2 {
    font-family: 'Nunito', sans-serif; font-weight: 900;
    font-size: 1.7rem; color: var(--text-dark); margin-bottom: 4px;
  }
  .setup-sub { font-size: 0.9rem; color: #999; margin-bottom: 26px; }

  .mode-toggle { display: flex; gap: 10px; margin-bottom: 26px; }
  .mode-btn {
    flex: 1; padding: 10px; border-radius: 50px;
    border: 2px solid #e0d8f0; background: white;
    font-family: 'Nunito', sans-serif; font-weight: 800;
    font-size: 0.9rem; color: #999; cursor: pointer; transition: all 0.15s;
  }
  .mode-btn.active { background: #7c5cbf; border-color: #7c5cbf; color: white; }

  #class-mode, #teams-mode { display: none; }
  #class-mode.visible, #teams-mode.visible { display: block; }

  .section-label {
    font-family: 'Nunito', sans-serif; font-weight: 800;
    font-size: 0.85rem; color: #666; margin-bottom: 10px;
  }

  .class-input-wrap input {
    width: 100%; padding: 10px 16px; border-radius: 50px;
    border: 2px solid #e0d8f0; font-family: 'Nunito', sans-serif;
    font-size: 0.95rem; color: var(--text-dark); outline: none;
    transition: border-color 0.15s;
  }
  .class-input-wrap input:focus { border-color: #7c5cbf; }

  #team-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
  .team-row { display: flex; align-items: center; gap: 10px; }
  .team-color-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }
  .team-row input {
    flex: 1; padding: 9px 14px; border-radius: 50px;
    border: 2px solid #e0d8f0; font-family: 'Nunito', sans-serif;
    font-size: 0.9rem; color: var(--text-dark); outline: none; transition: border-color 0.15s;
  }
  .team-row input:focus { border-color: #7c5cbf; }
  .remove-team-btn {
    background: none; border: none; cursor: pointer;
    font-size: 1rem; color: #ccc; transition: color 0.15s; padding: 4px;
  }
  .remove-team-btn:hover { color: #e24b4a; }
  .add-team-btn {
    background: #f0eaff; border: 2px dashed #c9b8f0; border-radius: 50px;
    padding: 8px 18px; font-family: 'Nunito', sans-serif; font-weight: 800;
    font-size: 0.85rem; color: #7c5cbf; cursor: pointer; width: 100%;
    transition: background 0.15s;
  }
  .add-team-btn:hover { background: #e4d8ff; }

  .start-btn {
    width: 100%; margin-top: 26px; padding: 14px;
    background: #7c5cbf; color: white; border: none; border-radius: 50px;
    font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.05rem;
    cursor: pointer; transition: background 0.15s;
  }
  .start-btn:hover { background: #6348a8; }

  /* ── GAME SCREEN ── */
  #game-screen { display: none; width: 100%; max-width: 820px; }
  #game-screen.visible { display: flex; flex-direction: column; align-items: center; }

  h1 {
    font-family: 'Nunito', sans-serif; font-weight: 900;
    font-size: 2rem; color: var(--text-dark); letter-spacing: -0.5px; margin-bottom: 4px;
  }
  .subtitle { font-size: 0.92rem; color: #888; margin-bottom: 16px; }

  /* Scoreboard */
  #scoreboard {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    width: 100%; margin-bottom: 20px;
  }
  .team-card {
    background: white; border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 10px 20px; display: flex; flex-direction: column;
    align-items: center; gap: 2px; cursor: pointer;
    border: 3px solid transparent; transition: all 0.2s; min-width: 100px;
    position: relative;
  }
  .team-card.active-team {
    border-color: var(--tc);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  }
  .team-card.active-team::after {
    content: '▼ playing';
    position: absolute; bottom: -22px;
    font-family: 'Nunito', sans-serif; font-weight: 800;
    font-size: 0.68rem; color: var(--tc); opacity: 0.8;
  }
  .team-name-label { font-family:'Nunito',sans-serif; font-weight:800; font-size:0.8rem; color:#888; }
  .team-score-num { font-family:'Nunito',sans-serif; font-weight:900; font-size:1.9rem; line-height:1; }
  .team-pts { font-size:0.68rem; color:#aaa; font-weight:600; }

  /* Pairs bar */
  .scorebar {
    display: flex; align-items: center; gap: 12px;
    background: white; border-radius: 50px; padding: 7px 20px;
    box-shadow: var(--shadow); margin-bottom: 14px;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.9rem; color: var(--text-dark);
  }
  .scorebar .badge { background: var(--accent); border-radius: 50px; padding: 2px 12px; font-size: 0.88rem; color:#fff; }

  /* Action buttons */
  .action-row { display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; justify-content:center; }
  .action-btn {
    padding: 9px 22px; border-radius: 50px; border: 2px solid;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.85rem;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-new-round  { background:#e8f5e9; border-color:#4caf7d; color:#2e7d51; }
  .btn-new-round:hover  { background:#c8ecd0; }
  .btn-end-game   { background:#fff3e0; border-color:#f7b731; color:#b37d00; }
  .btn-end-game:hover   { background:#ffe0b2; }
  .btn-setup      { background:#f0eaff; border-color:#a87fe0; color:#5c3e99; }
  .btn-setup:hover      { background:#e4d8ff; }

  /* Call-out panel */
  .callout-panel {
    background: white; border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 12px 18px; margin-bottom: 18px;
    width: 100%; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .callout-label { font-family:'Nunito',sans-serif; font-weight:800; font-size:0.88rem; color:#555; white-space:nowrap; }
  .name-chips { display:flex; flex-wrap:wrap; gap:6px; }
  .chip {
    background: #f0eaff; color: #7c5cbf; border-radius: 50px;
    padding: 4px 12px; font-size: 0.78rem; font-family: 'Nunito', sans-serif;
    font-weight: 800; cursor: pointer; border: 2px solid transparent;
    transition: all 0.15s; user-select: none;
  }
  .chip:hover { border-color:#7c5cbf; background:#e4d8ff; }
  .chip.used  { background:#e8f5e9; color:#4caf7d; border-color:transparent; cursor:default; }
  .chip.active{ background:#7c5cbf; color:white; }

  /* Grid */
  .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; width:100%; }

  /* Card */
  .card { aspect-ratio:0.75; perspective:800px; cursor:pointer; position:relative; }
  .card-inner {
    width:100%; height:100%; position:relative;
    transform-style:preserve-3d;
    transition:transform 0.5s cubic-bezier(.4,0,.2,1);
    border-radius:var(--radius);
  }
  .card.flipped .card-inner,
  .card.matched .card-inner { transform:rotateY(180deg); }

  .card-face {
    position:absolute; inset:0; border-radius:var(--radius);
    backface-visibility:hidden; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:5px; box-shadow:var(--shadow);
  }
  .card-back {
    background:linear-gradient(135deg,#7c5cbf,#a87fe0);
    color:white; font-family:'Nunito',sans-serif; font-weight:900;
    text-align:center; padding:8px; border:3px solid rgba(255,255,255,0.25);
  }
  .card-back .animal-icon { font-size:1.5rem; line-height:1; }
  .card-back .cell-name   { font-size:1.6rem; opacity:0.95; margin-top:2px; }
  .card-front {
    background:white; transform:rotateY(180deg);
    padding:8px 6px; border:3px solid #f0eaff; gap:4px;
  }
  .card.matched .card-front { background:#f0fff6; border-color:#4caf7d; }
  .match-badge {
    position:absolute; top:5px; right:5px;
    width:13px; height:13px; border-radius:50%;
    display:none; z-index:2; border:2px solid white;
  }
  .card.matched .match-badge { display:block; }
  .vocab-icon { font-size:1.9rem; line-height:1; }
  .vocab-word {
    font-family:'Nunito',sans-serif; font-weight:900;
    font-size:2.16rem; color:var(--text-dark); text-align:center;
  }

  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
  }
  .card.shake { animation:shake 0.4s ease; }

  /* Overlays */
  .overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.45); z-index:100;
    align-items:center; justify-content:center;
  }
  .overlay.show { display:flex; }
  .modal-box {
    background:white; border-radius:28px; padding:38px 44px; text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.2);
    animation:popIn 0.35s cubic-bezier(.4,0,.2,1); max-width:420px; width:90%;
  }
  @keyframes popIn { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }
  .big-emoji { font-size:3.5rem; }
  .modal-box h2 {
    font-family:'Nunito',sans-serif; font-weight:900;
    font-size:1.9rem; color:var(--text-dark); margin:12px 0 6px;
  }
  .modal-box p { color:#888; font-size:0.95rem; margin-bottom:20px; }
  .winner-name {
    font-family:'Nunito',sans-serif; font-weight:900;
    font-size:1.5rem; margin:6px 0 4px;
  }
  .final-scores {
    list-style:none; margin:14px 0 22px; text-align:left;
    display:flex; flex-direction:column; gap:7px;
  }
  .final-scores li {
    display:flex; align-items:center; gap:10px;
    font-family:'Nunito',sans-serif; font-weight:800; font-size:0.9rem;
    background:#f8f6ff; border-radius:50px; padding:7px 16px;
  }
  .fs-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
  .fs-pts { margin-left:auto; color:#7c5cbf; }
  .modal-btn-row { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .modal-btn {
    padding:11px 26px; border:none; border-radius:50px;
    font-family:'Nunito',sans-serif; font-weight:800; font-size:0.9rem;
    cursor:pointer; transition:background 0.15s;
  }
  .modal-btn.primary   { background:#7c5cbf; color:white; }
  .modal-btn.primary:hover { background:#6348a8; }
  .modal-btn.secondary { background:#f0eaff; color:#7c5cbf; }
  .modal-btn.secondary:hover { background:#e4d8ff; }

  /* Confetti */
  .confetti-wrap { position:fixed; inset:0; pointer-events:none; z-index:99; }
  .dot { position:absolute; border-radius:50%; animation:fall 1.8s ease-in forwards; }
  @keyframes fall {
    0%  { transform:translateY(-20px) rotate(0deg); opacity:1; }
    100%{ transform:translateY(110vh) rotate(720deg); opacity:0; }
  }
</style>
</head>
<body>

<!-- ══ SETUP SCREEN ══ -->
<div id="setup-screen">
  <h2>🎮 Vocab Match!</h2>
  <p class="setup-sub">Set up before starting the game</p>

  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-mode-teams" onclick="setMode('teams')">👥 Teams</button>
    <button class="mode-btn" id="btn-mode-class" onclick="setMode('class')">🏫 Whole Class</button>
  </div>

  <div id="teams-mode" class="visible">
    <p class="section-label">Team names</p>
    <div id="team-list"></div>
    <button class="add-team-btn" onclick="addTeam()">+ Add a team</button>
  </div>

  <div id="class-mode">
    <p class="section-label">Class / group name</p>
    <div class="class-input-wrap">
      <input type="text" id="class-name-input" placeholder="e.g. Class 5A" value="Class 5A" />
    </div>
  </div>

  <button class="start-btn" onclick="startGame()">▶ Start Game</button>
</div>

<!-- ══ GAME SCREEN ══ -->
<div id="game-screen">
  <h1>🎮 Vocab Match!</h1>
  <p class="subtitle">Call a name to flip a card — find the matching pairs!</p>

  <div id="scoreboard"></div>

  <div class="scorebar">
    <span>Pairs found</span>
    <span class="badge" id="score-display">0 / 10</span>
  </div>

  <div class="action-row">
    <button class="action-btn btn-new-round" onclick="newRound()">🔄 New Round</button>
    <button class="action-btn btn-end-game"  onclick="endGame()">🏁 End Game</button>
    <button class="action-btn btn-setup"     onclick="goSetup()">⚙ Edit Teams</button>
  </div>

  <div class="grid" id="grid"></div>
</div>

<!-- ══ ROUND COMPLETE OVERLAY ══ -->
<div class="overlay" id="round-win-overlay">
  <div class="modal-box">
    <div class="big-emoji">🎉</div>
    <h2>Round Complete!</h2>
    <p id="round-win-msg">All pairs matched!</p>
    <div class="modal-btn-row">
      <button class="modal-btn primary"   onclick="newRound()">🔄 New Round</button>
      <button class="modal-btn secondary" onclick="endGame()">🏁 End Game</button>
    </div>
  </div>
</div>

<!-- ══ END GAME OVERLAY ══ -->
<div class="overlay" id="end-overlay">
  <div class="modal-box">
    <div class="big-emoji" id="end-emoji">🏆</div>
    <h2 id="end-title">Game Over!</h2>
    <div class="winner-name" id="end-winner"></div>
    <ul class="final-scores" id="final-scores-list"></ul>
    <div class="modal-btn-row">
      <button class="modal-btn primary"   onclick="freshRound()">🔄 New Round</button>
      <button class="modal-btn secondary" onclick="goSetupFromEnd()">⚙ Edit Teams</button>
    </div>
  </div>
</div>

<div class="confetti-wrap" id="confetti"></div>

<script>
const TEAM_COLORS = ['#7c5cbf','#f06292','#42a5f5','#4caf7d','#ff7043','#f7b731','#26c6da','#ab47bc'];

let mode = 'teams';
let teams = [];
let activeTeamIdx = 0;

const vocab = [
  {word:'ant',icon:'🐜'},{word:'colony',icon:'🏘️'},{word:'tunnel',icon:'🕳️'},
  {word:'queen',icon:'👑'},{word:'worker',icon:'👷'},{word:'food',icon:'🍞'},
  {word:'dig',icon:'⛏️'},{word:'carry',icon:'🎒'},{word:'build',icon:'🏗️'},
  {word:'work',icon:'💪'},
];
const cellNames = Array.from({length:20},(_,i)=>({name:`${i+1}`,icon:''}));

let nameMap=[], flipped=[], matchedCount=0, locked=false;

// ── SETUP ──
function setMode(m) {
  mode = m;
  document.getElementById('btn-mode-teams').classList.toggle('active', m==='teams');
  document.getElementById('btn-mode-class').classList.toggle('active', m==='class');
  document.getElementById('teams-mode').classList.toggle('visible', m==='teams');
  document.getElementById('class-mode').classList.toggle('visible', m==='class');
}

function addTeam(name) {
  const list = document.getElementById('team-list');
  const idx  = list.children.length;
  if (idx >= 8) return;
  const color = TEAM_COLORS[idx];
  const row = document.createElement('div');
  row.className = 'team-row';
  row.innerHTML = `
    <div class="team-color-dot" style="background:${color}"></div>
    <input type="text" placeholder="Team name" value="${name||'Team '+(idx+1)}" />
    <button class="remove-team-btn" onclick="removeTeam(this)" title="Remove">✕</button>`;
  list.appendChild(row);
}

function removeTeam(btn) {
  const list = document.getElementById('team-list');
  if (list.children.length <= 1) return;
  btn.parentElement.remove();
  Array.from(list.children).forEach((row,i) => {
    row.querySelector('.team-color-dot').style.background = TEAM_COLORS[i];
  });
}

function startGame() {
  if (mode==='teams') {
    const rows = document.querySelectorAll('#team-list .team-row');
    teams = Array.from(rows).map((row,i) => ({
      name: row.querySelector('input').value.trim() || `Team ${i+1}`,
      color: TEAM_COLORS[i], score: 0,
    }));
  } else {
    const n = document.getElementById('class-name-input').value.trim() || 'Class';
    teams = [{name:n, color:'#7c5cbf', score:0}];
  }
  activeTeamIdx = 0;
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('game-screen').classList.add('visible');
  buildGame();
  renderGame();
}

function goSetup() {
  document.getElementById('game-screen').classList.remove('visible');
  document.getElementById('setup-screen').style.display = '';
}

// ── SCOREBOARD ──
function renderScoreboard() {
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = '';
  teams.forEach((t,i) => {
    const card = document.createElement('div');
    card.className = 'team-card' + (i===activeTeamIdx ? ' active-team' : '');
    card.style.setProperty('--tc', t.color);
    card.innerHTML = `
      <span class="team-name-label">${t.name}</span>
      <span class="team-score-num" style="color:${t.color}">${t.score}</span>
      <span class="team-pts">pts</span>`;
    card.onclick = () => { activeTeamIdx=i; renderScoreboard(); };
    sb.appendChild(card);
  });
}

// ── GAME BUILD ──
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function buildGame() {
  const pairs = vocab.flatMap(v=>[
    {word:v.word,icon:v.icon,id:v.word},
    {word:v.word,icon:v.icon,id:v.word},
  ]);
  const cards = shuffle(pairs);
  // Numbers always go 1,2,3...24 in grid order — only vocab is shuffled
  nameMap = cards.map((c,i)=>({...c,cellName:{name:`${i+1}`,icon:''},index:i,teamColor:null}));
  flipped=[]; matchedCount=0; locked=false;
}

function renderGame() {
  renderScoreboard();
  document.getElementById('score-display').textContent = `${matchedCount} / 10`;
  const grid=document.getElementById('grid');
  grid.innerHTML='';

  nameMap.forEach((c,i)=>{
    const el=document.createElement('div');
    el.className='card'; el.dataset.index=i;
    el.innerHTML=`
      <div class="card-inner">
        <div class="card-face card-back">
          <span class="cell-name">${c.cellName.name}</span>
        </div>
        <div class="card-face card-front">
          <div class="match-badge" style="background:${c.teamColor||'transparent'}"></div>
          <span class="vocab-icon">${c.icon}</span>
          <span class="vocab-word">${c.word}</span>
        </div>
      </div>`;
    el.addEventListener('click',()=>flipCard(i));
    grid.appendChild(el);
  });
}

// ── FLIP ──
function flipCard(index) {
  if(locked) return;
  const cardEl=document.querySelector(`.card[data-index="${index}"]`);
  if(!cardEl||cardEl.classList.contains('flipped')||cardEl.classList.contains('matched')) return;
  cardEl.classList.add('flipped');
  updateChip(index,'active');
  flipped.push(index);

  if(flipped.length===2){
    locked=true;
    const [a,b]=flipped;
    if(nameMap[a].id===nameMap[b].id){
      const color=teams[activeTeamIdx].color;
      setTimeout(()=>{
        [a,b].forEach(i=>{
          const el=document.querySelector(`.card[data-index="${i}"]`);
          el.classList.remove('flipped'); el.classList.add('matched'); el.style.cursor='default';
          el.querySelector('.match-badge').style.background=color;
          updateChip(i,'used'); nameMap[i].teamColor=color;
        });
        teams[activeTeamIdx].score++;
        matchedCount++;
        document.getElementById('score-display').textContent=`${matchedCount} / 10`;
        renderScoreboard();
        flipped=[]; locked=false;
        if(matchedCount===10) setTimeout(showRoundWin,400);
      },600);
    } else {
      setTimeout(()=>{
        [a,b].forEach(i=>{
          const el=document.querySelector(`.card[data-index="${i}"]`);
          el.classList.add('shake');
          setTimeout(()=>{el.classList.remove('flipped','shake');updateChip(i,'');},420);
        });
        flipped=[]; locked=false;
      },900);
    }
  }
}

function updateChip(index,state){
  const chip=document.querySelector(`.chip[data-index="${index}"]`);
  if(!chip) return;
  chip.classList.remove('active','used');
  if(state) chip.classList.add(state);
}

// ── ROUND WIN ──
function showRoundWin(){
  if(teams.length===1){
    document.getElementById('round-win-msg').textContent=`${teams[0].name} found all 10 pairs! Total: ${teams[0].score} pts`;
  } else {
    const leader=[...teams].sort((a,b)=>b.score-a.score)[0];
    document.getElementById('round-win-msg').textContent=`${leader.name} is leading with ${leader.score} pts!`;
  }
  document.getElementById('round-win-overlay').classList.add('show');
  launchConfetti();
}

function newRound(){
  document.getElementById('round-win-overlay').classList.remove('show');
  activeTeamIdx=0;
  buildGame(); renderGame();
}

// ── END GAME ──
function endGame(){
  document.getElementById('round-win-overlay').classList.remove('show');
  const sorted=[...teams].sort((a,b)=>b.score-a.score);
  const top=sorted[0];
  const isTie=sorted.length>1 && sorted[0].score===sorted[1].score && sorted[0].score>0;
  const noPoints=top.score===0;

  document.getElementById('end-emoji').textContent = noPoints ? '🎮' : isTie ? '🤝' : '🏆';
  document.getElementById('end-title').textContent  = noPoints ? 'Game Over!' : isTie ? "It's a Tie!" : 'We Have a Winner!';

  const winnerEl=document.getElementById('end-winner');
  if(noPoints){
    winnerEl.textContent='No points yet — play some rounds!'; winnerEl.style.color='#aaa';
  } else if(isTie){
    const tiers=sorted.filter(t=>t.score===top.score);
    winnerEl.textContent=tiers.map(t=>t.name).join(' & '); winnerEl.style.color='#7c5cbf';
  } else {
    winnerEl.textContent=`🥇 ${top.name}`; winnerEl.style.color=top.color;
  }

  const list=document.getElementById('final-scores-list');
  list.innerHTML='';
  sorted.forEach(t=>{
    const li=document.createElement('li');
    li.innerHTML=`<span class="fs-dot" style="background:${t.color}"></span>${t.name}<span class="fs-pts">${t.score} pts</span>`;
    list.appendChild(li);
  });

  document.getElementById('end-overlay').classList.add('show');
  if(!noPoints) launchConfetti();
}

function freshRound(){
  document.getElementById('end-overlay').classList.remove('show');
  teams.forEach(t=>t.score=0);
  activeTeamIdx=0;
  buildGame(); renderGame();
}

function goSetupFromEnd(){
  document.getElementById('end-overlay').classList.remove('show');
  teams.forEach(t=>t.score=0);
  goSetup();
}

// ── CONFETTI ──
function launchConfetti(){
  const wrap=document.getElementById('confetti');
  wrap.innerHTML='';
  const colors=['#7c5cbf','#f7b731','#4caf7d','#f06292','#42a5f5','#ff7043'];
  for(let i=0;i<70;i++){
    const dot=document.createElement('div');
    dot.className='dot';
    dot.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[i%colors.length]};animation-delay:${Math.random()*1.3}s;width:${8+Math.random()*10}px;height:${8+Math.random()*10}px`;
    wrap.appendChild(dot);
  }
  setTimeout(()=>wrap.innerHTML='',3200);
}

// ── INIT ──
addTeam('Team 1');
addTeam('Team 2');
</script>
